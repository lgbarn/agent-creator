name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pyyaml ruff

      - name: Lint with ruff
        run: |
          ruff check scripts/
          ruff format --check scripts/

      - name: Validate plugin structure
        run: |
          test -f .claude-plugin/plugin.json
          test -f skills/agent-creator/SKILL.md
          python -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Validate example scenario schema
        run: |
          python -c "
          import json
          scenarios = json.load(open('evals/example-scenario.json'))
          assert isinstance(scenarios, list), 'Must be a list'
          for s in scenarios:
              assert 'name' in s, 'Missing name'
              assert 'agent' in s, 'Missing agent'
              assert 'turns' in s, 'Missing turns'
              for t in s['turns']:
                  assert 'user' in t, 'Missing user message in turn'
          print(f'Validated {len(scenarios)} scenario(s)')
          "

      - name: Test module imports
        run: |
          cd $GITHUB_WORKSPACE
          python -c "from scripts.utils import parse_agent_md, find_agent_file, extract_xml_sections, word_count; print('utils: OK')"
          python -c "from scripts.run_trigger_eval import run_trigger_eval, find_project_root; print('run_trigger_eval: OK')"
          python -c "from scripts.run_loop import split_scenarios; print('run_loop: OK')"

      - name: Test validator against sample agent
        run: |
          cat > /tmp/test-agent.md << 'AGENT'
          ---
          name: test-agent
          description: A test agent for CI validation
          model: sonnet
          color: blue
          tools: Read, Grep, Glob
          ---

          <role>
          You are a test agent used for CI validation.
          </role>

          <knowledge>
          You know about testing and validation.
          </knowledge>

          <style>
          Direct and concise.
          </style>

          <rules>
          - Only used in CI
          </rules>
          AGENT
          python scripts/validate_agent.py /tmp/test-agent.md

      - name: Test validator catches errors
        run: |
          # Missing required fields
          cat > /tmp/bad-agent.md << 'AGENT'
          ---
          name: bad
          ---
          No description field
          AGENT
          python scripts/validate_agent.py /tmp/bad-agent.md && exit 1 || echo "Correctly rejected invalid agent"

          # Invalid model
          cat > /tmp/bad-model.md << 'AGENT'
          ---
          name: bad-model-agent
          description: Agent with invalid model
          model: gpt-4
          ---
          Test
          AGENT
          python scripts/validate_agent.py /tmp/bad-model.md && exit 1 || echo "Correctly rejected invalid model"

      - name: Test packaging
        run: |
          cat > /tmp/packagable-agent.md << 'AGENT'
          ---
          name: packagable-agent
          description: An agent that can be packaged for distribution testing
          model: sonnet
          color: green
          ---

          <role>
          A simple agent for testing the packaging script.
          </role>
          AGENT
          python scripts/package_agent.py /tmp/packagable-agent.md /tmp/
          test -f /tmp/packagable-agent.agent
          echo "Package created successfully"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version sync across files
        run: bash scripts/check-versions.sh

  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [validate, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag and release if new version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.version' package.json)
          TAG="v${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
            exit 0
          fi

          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Created tag ${TAG}"

          # Extract changelog section for this version
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)

          if [ -z "${NOTES}" ]; then
            NOTES="Release ${TAG}"
          fi

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${NOTES}"
          echo "Created release ${TAG}"

  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'master')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version sync across files
        run: bash scripts/check-versions.sh

      - name: Get version from PR branch
        id: pr_version
        run: |
          PR_VERSION=$(jq -r '.version' package.json)
          echo "version=$PR_VERSION" >> $GITHUB_OUTPUT

      - name: Get version from base branch
        id: base_version
        run: |
          git fetch origin ${{ github.base_ref }}
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:package.json | jq -r '.version')
          echo "version=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Compare versions
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"
          BASE_VERSION="${{ steps.base_version.outputs.version }}"

          echo "PR version: $PR_VERSION"
          echo "Base version: $BASE_VERSION"

          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Version in package.json ($PR_VERSION) has not been updated. Please bump the version before merging."
            exit 1
          fi

          HIGHER=$(printf '%s\n%s' "$BASE_VERSION" "$PR_VERSION" | sort -V | tail -n1)
          if [ "$HIGHER" != "$PR_VERSION" ]; then
            echo "::error::PR version ($PR_VERSION) must be greater than base version ($BASE_VERSION)"
            exit 1
          fi

          echo "✓ Version updated: $BASE_VERSION → $PR_VERSION"

      - name: Check CHANGELOG updated
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"

          if ! grep -q "## \[${PR_VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain an entry for version $PR_VERSION"
            exit 1
          fi

          echo "✓ CHANGELOG.md contains entry for $PR_VERSION"
